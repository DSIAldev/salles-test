<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salles — Aldev</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --rouge: #EC2E4A;
    --bleu: #303C53;
    --gris-clair: #E8E9ED;
    --gris-moyen: #A2A7B3;
    --bleu-ciel: #68B3E8;
    --blanc: #ffffff;
    --bg: #F4F5F7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--bleu); min-height: 100vh; }

  header {
    background: var(--bleu);
    padding: 0 40px;
    display: flex;
    align-items: center;
    gap: 24px;
    height: 72px;
    box-shadow: 0 2px 12px rgba(48,60,83,0.18);
  }
  header img { height: 44px; width: auto; background: white; border-radius: 6px; padding: 4px 8px; }
  .header-divider { width: 1px; height: 36px; background: rgba(255,255,255,0.2); }
  .header-title { flex: 1; }
  .header-title h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 1.3rem; font-weight: 700; color: var(--blanc); letter-spacing: 0.04em; text-transform: uppercase; }
  .header-title p { font-size: 0.75rem; color: var(--bleu-ciel); font-weight: 300; letter-spacing: 0.05em; }
  .header-badge { background: var(--rouge); color: var(--blanc); font-size: 0.7rem; font-weight: 700; padding: 5px 12px; border-radius: 4px; letter-spacing: 0.08em; text-transform: uppercase; }

  .controls {
    background: var(--blanc);
    border-bottom: 2px solid var(--rouge);
    padding: 14px 40px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(48,60,83,0.08);
  }
  .controls label { font-size: 0.75rem; font-weight: 600; color: var(--gris-moyen); text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }
  .select-wrapper { position: relative; min-width: 220px; }
  .select-wrapper::after { content: '▾'; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--rouge); pointer-events: none; font-size: 0.85rem; }
  select { width: 100%; appearance: none; background: var(--gris-clair); border: 1.5px solid var(--gris-clair); border-radius: 6px; padding: 9px 32px 9px 12px; font-family: 'Barlow', sans-serif; font-size: 0.88rem; font-weight: 500; color: var(--bleu); cursor: pointer; transition: border-color 0.2s; }
  select:focus { outline: none; border-color: var(--rouge); }

  .pills-section { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; flex: 1; }
  .pills-label { font-size: 0.68rem; font-weight: 700; color: var(--gris-moyen); text-transform: uppercase; letter-spacing: 0.1em; white-space: nowrap; background: var(--gris-clair); padding: 3px 8px; border-radius: 3px; }
  .pills { display: flex; gap: 5px; flex-wrap: wrap; }
  .pill { background: var(--gris-clair); border: 1.5px solid var(--gris-clair); border-radius: 4px; padding: 5px 10px; font-size: 0.73rem; font-weight: 600; color: var(--gris-moyen); cursor: pointer; transition: all 0.15s ease; white-space: nowrap; }
  .pill:hover { border-color: var(--rouge); color: var(--rouge); background: #fff; }
  .pill.active { background: var(--rouge); border-color: var(--rouge); color: var(--blanc); }
  .pill .cap { opacity: 0.75; margin-left: 3px; font-weight: 400; }

  .frame-container { padding: 28px 40px; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .room-header { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
  .room-icon { width: 46px; height: 46px; background: var(--rouge); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--blanc); font-family: 'Barlow Condensed', sans-serif; font-size: 1.2rem; font-weight: 700; flex-shrink: 0; }
  .room-title h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--bleu); letter-spacing: 0.03em; text-transform: uppercase; }
  .room-title p { font-size: 0.78rem; color: var(--gris-moyen); margin-top: 2px; }
  .capacity-tag { margin-left: auto; background: var(--bleu); color: var(--blanc); font-size: 0.72rem; font-weight: 700; padding: 5px 14px; border-radius: 4px; letter-spacing: 0.06em; text-transform: uppercase; }
  .building-tag { background: var(--bleu-ciel); color: var(--bleu); font-size: 0.68rem; font-weight: 700; padding: 4px 10px; border-radius: 4px; letter-spacing: 0.05em; text-transform: uppercase; margin-left: 8px; }

  .iframe-wrapper { background: var(--blanc); border-radius: 10px; overflow: hidden; box-shadow: 0 2px 16px rgba(48,60,83,0.10); border: 1px solid var(--gris-clair); }
  iframe { width: 100%; height: 680px; border: none; display: block; }
  .iframe-actions { padding: 12px 20px; border-top: 1px solid var(--gris-clair); display: flex; align-items: center; justify-content: space-between; background: var(--bg); }
  .iframe-actions span { font-size: 0.75rem; color: var(--gris-moyen); }
  .btn-reserve { background: var(--rouge); color: var(--blanc); border: none; border-radius: 6px; padding: 8px 18px; font-family: 'Barlow', sans-serif; font-size: 0.82rem; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; letter-spacing: 0.03em; transition: background 0.2s; }
  .btn-reserve:hover { background: #c4213a; }

  .empty-state { text-align: center; padding: 80px 20px; color: var(--gris-moyen); }
  .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
  .empty-state h3 { font-family: 'Barlow Condensed', sans-serif; font-size: 1.3rem; font-weight: 700; color: var(--bleu); text-transform: uppercase; letter-spacing: 0.05em; }
  .empty-state p { font-size: 0.85rem; margin-top: 8px; color: var(--gris-moyen); }

  footer { text-align: center; padding: 20px; font-size: 0.72rem; color: var(--gris-moyen); border-top: 1px solid var(--gris-clair); background: var(--blanc); }

  @media (max-width: 768px) {
    header, .controls, .frame-container { padding-left: 16px; padding-right: 16px; }
    .pills-section { display: none; }
    iframe { height: 500px; }
    header { height: auto; padding-top: 14px; padding-bottom: 14px; }
  }
</style>
</head>
<body>

<header>
  <img id="logo" src="" alt="Aldev">
  <div class="header-divider"></div>
  <div class="header-title">
    <h1>Salles de réunion</h1>
    <p>Disponibilité et réservation — Angers Loire Développement</p>
  </div>
  <span class="header-badge">Angers</span>
</header>

<div class="controls">
  <label>Salle</label>
  <div class="select-wrapper">
    <select id="roomSelect">
      <option value="">— Choisir une salle —</option>
      <option value="0">1-Auditorium (200p)</option>
      <option value="1">1-Le Club (20p)</option>
      <option value="15">4-Ardoisières (7p)</option>
      <option value="16">4-Bessonneau (4p)</option>
      <option value="17">4-Bouvet (4p)</option>
      <option value="18">4-Bull (10p)</option>
      <option value="19">4-Courant (3p)</option>
      <option value="20">4-Giffard (5p)</option>
      <option value="12">4-Le Cube (4p)</option>
      <option value="13">4-Le Cube (6p)</option>
      <option value="14">4-Le Cube (7p)</option>
      <option value="21">4-Scania (10p)</option>
      <option value="2">7-Aubance (4p)</option>
      <option value="3">7-Authion (10p)</option>
      <option value="4">7-Confluences (30p)</option>
      <option value="5">7-Layon (4p)</option>
      <option value="6">7-Loire (19p)</option>
      <option value="7">7-Louet (4p)</option>
      <option value="8">7-Maine (18p)</option>
      <option value="9">7-Mayenne (13p)</option>
      <option value="10">7-Oudon (8p)</option>
      <option value="11">7-Sarthe (15p)</option>
    </select>
  </div>
  <div class="pills-section">
    <span class="pills-label">Métamorphose</span>
    <div class="pills" id="pills-meta"></div>
    <span class="pills-label">Aldev</span>
    <div class="pills" id="pills-aldev"></div>
  </div>
</div>

<div class="frame-container" id="frameContainer">
  <div class="empty-state">
    <div class="icon">🏢</div>
    <h3>Sélectionnez une salle</h3>
    <p>Choisissez une salle dans le menu pour afficher son calendrier de disponibilité</p>
  </div>
</div>

<footer>
  Angers Loire Développement &nbsp;·&nbsp; Les calendriers sont mis à jour automatiquement
</footer>

// Pills Métamorphose (index 0-11)
const pillsMeta = document.getElementById('pills-meta');
salles.slice(0, 12).forEach((s, i) => {
  const pill = document.createElement('button');
  pill.className = 'pill';
  pill.id = `pill-${i}`;
  pill.innerHTML = `${s.nom}<span class="cap">${s.cap}</span>`;
  pill.onclick = () => selectRoom(i);
  pillsMeta.appendChild(pill);
});

// Pills Aldev (index 12-21)
const pillsAldev = document.getElementById('pills-aldev');
salles.slice(12).forEach((s, i) => {
  const idx = i + 12;
  const pill = document.createElement('button');
  pill.className = 'pill';
  pill.id = `pill-${idx}`;
  pill.innerHTML = `${s.nom}<span class="cap">${s.cap}</span>`;
  pill.onclick = () => selectRoom(idx);
  pillsAldev.appendChild(pill);
});

function selectRoom(idx) {
  if (idx === '' || idx === null) return;
  idx = parseInt(idx);
  const salle = salles[idx];

  document.getElementById('roomSelect').value = idx;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  const activePill = document.getElementById(`pill-${idx}`);
  if (activePill) {
    activePill.classList.add('active');
    activePill.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }

  const container = document.getElementById('frameContainer');
  container.style.animation = 'none';
  container.offsetHeight;
  container.style.animation = 'fadeIn 0.25s ease';

  const batimentColor = salle.batiment === 'Métamorphose' ? 'var(--bleu-ciel)' : 'var(--rouge)';

  container.innerHTML = `
    <div class="room-header">
      <div class="room-icon">${salle.nom.charAt(0)}</div>
      <div class="room-title">
        <h2>${salle.nom}</h2>
        <p>${salle.etage} &nbsp;·&nbsp; ${salle.batiment}, Angers</p>
      </div>
      <span class="building-tag" style="background:${batimentColor}">${salle.batiment}</span>
      <span class="capacity-tag">⬩ ${salle.cap}</span>
    </div>
    <div class="iframe-wrapper">
      <iframe src="${salle.url}" title="Calendrier ${salle.nom}" loading="lazy"></iframe>
      <div class="iframe-actions">
        <span>📧 ${salle.email}</span>
        <a class="btn-reserve" href="mailto:${salle.email}?subject=Réservation — Salle ${salle.nom}">Réserver cette salle</a>
      </div>
    </div>
  `;
}

// Exposer globalement pour le select
window.selectRoom = selectRoom;

// Lier le select via addEventListener
document.getElementById('roomSelect').addEventListener('change', function() {
  selectRoom(this.value);
});
</script>
